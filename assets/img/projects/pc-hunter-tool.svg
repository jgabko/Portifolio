<svg viewBox="0 0 700 438" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t1">
  <title id="t1">pc-hunter-tool — scraping and market-monitoring dashboard</title>
  <defs>
    <pattern id="stripes1" width="11" height="11" patternTransform="rotate(135)" patternUnits="userSpaceOnUse">
      <rect width="11" height="11" fill="#0d0d0d"/>
      <line x1="0" y1="0" x2="0" y2="11" stroke="#1f1f1f" stroke-width="2"/>
    </pattern>
    <linearGradient id="bars1" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#1f9a4c"/>
      <stop offset="1" stop-color="#39ff7a"/>
    </linearGradient>
  </defs>

  <rect width="700" height="438" fill="url(#stripes1)"/>
  <rect width="700" height="438" fill="#0d0d0d" fill-opacity="0.35"/>

  <!-- monitor frame -->
  <rect x="130" y="96" width="440" height="270" rx="6" fill="#161616" stroke="#3a3a3a" stroke-width="2"/>
  <rect x="130" y="96" width="440" height="34" fill="#1f1f1f"/>
  <circle cx="150" cy="113" r="5" fill="#4a4a4a"/>
  <circle cx="168" cy="113" r="5" fill="#4a4a4a"/>
  <circle cx="186" cy="113" r="5" fill="#4a4a4a"/>

  <!-- axis -->
  <line x1="176" y1="330" x2="176" y2="160" stroke="#5a5a5a" stroke-width="2"/>
  <line x1="176" y1="330" x2="524" y2="330" stroke="#5a5a5a" stroke-width="2"/>

  <!-- bars: rising market trend -->
  <rect x="200" y="290" width="30" height="40" fill="#3a3a3a"/>
  <rect x="248" y="260" width="30" height="70" fill="#4a4a4a"/>
  <rect x="296" y="225" width="30" height="105" fill="#5a5a5a"/>
  <rect x="344" y="195" width="30" height="135" fill="url(#bars1)"/>
  <rect x="392" y="165" width="30" height="165" fill="url(#bars1)"/>

  <!-- trend line -->
  <polyline points="215,300 263,270 311,238 359,205 407,175" fill="none" stroke="#39ff7a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="407" cy="175" r="5" fill="#39ff7a"/>

  <!-- magnifier scanning the chart -->
  <circle cx="470" cy="230" r="46" fill="#0d0d0d" fill-opacity="0.55" stroke="#e5e5e5" stroke-width="4"/>
  <line x1="502" y1="262" x2="540" y2="300" stroke="#e5e5e5" stroke-width="6" stroke-linecap="round"/>
  <line x1="450" y1="230" x2="490" y2="230" stroke="#39ff7a" stroke-width="3" stroke-linecap="round"/>
  <line x1="470" y1="210" x2="470" y2="250" stroke="#39ff7a" stroke-width="3" stroke-linecap="round"/>
</svg>
