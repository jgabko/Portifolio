<svg viewBox="0 0 700 438" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t3">
  <title id="t3">imob-data — real estate scraping and price-prediction dashboards</title>
  <defs>
    <pattern id="stripes3" width="11" height="11" patternTransform="rotate(135)" patternUnits="userSpaceOnUse">
      <rect width="11" height="11" fill="#0d0d0d"/>
      <line x1="0" y1="0" x2="0" y2="11" stroke="#1f1f1f" stroke-width="2"/>
    </pattern>
  </defs>

  <rect width="700" height="438" fill="url(#stripes3)"/>
  <rect width="700" height="438" fill="#0d0d0d" fill-opacity="0.35"/>

  <!-- house outline -->
  <path d="M220 250 L340 150 L460 250" fill="none" stroke="#e5e5e5" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="240" y="250" width="200" height="120" fill="#161616" stroke="#e5e5e5" stroke-width="4"/>
  <rect x="310" y="300" width="60" height="70" fill="#0d0d0d" stroke="#5a5a5a" stroke-width="2"/>
  <rect x="256" y="270" width="34" height="34" fill="#0d0d0d" stroke="#5a5a5a" stroke-width="2"/>
  <rect x="390" y="270" width="34" height="34" fill="#0d0d0d" stroke="#5a5a5a" stroke-width="2"/>

  <!-- price-heatmap grid, blue accent gradient of cells -->
  <g>
    <rect x="480" y="150" width="30" height="30" fill="#232323"/>
    <rect x="513" y="150" width="30" height="30" fill="#1f9a4c" fill-opacity="0.5"/>
    <rect x="546" y="150" width="30" height="30" fill="#39ff7a"/>
    <rect x="480" y="183" width="30" height="30" fill="#1f9a4c" fill-opacity="0.5"/>
    <rect x="513" y="183" width="30" height="30" fill="#39ff7a"/>
    <rect x="546" y="183" width="30" height="30" fill="#232323"/>
    <rect x="480" y="216" width="30" height="30" fill="#39ff7a"/>
    <rect x="513" y="216" width="30" height="30" fill="#232323"/>
    <rect x="546" y="216" width="30" height="30" fill="#1f9a4c" fill-opacity="0.5"/>
  </g>

  <!-- price tag -->
  <g transform="translate(150,300)">
    <path d="M0 20 L20 0 L60 0 L60 40 L20 40 Z" fill="#161616" stroke="#39ff7a" stroke-width="3" stroke-linejoin="round"/>
    <circle cx="32" cy="20" r="4" fill="#39ff7a"/>
  </g>
</svg>
