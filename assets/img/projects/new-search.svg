<svg viewBox="0 0 700 438" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t5">
  <title id="t5">new-search — news scraping and sentiment analysis pipeline</title>
  <defs>
    <pattern id="stripes5" width="11" height="11" patternTransform="rotate(135)" patternUnits="userSpaceOnUse">
      <rect width="11" height="11" fill="#0d0d0d"/>
      <line x1="0" y1="0" x2="0" y2="11" stroke="#1f1f1f" stroke-width="2"/>
    </pattern>
  </defs>

  <rect width="700" height="438" fill="url(#stripes5)"/>
  <rect width="700" height="438" fill="#0d0d0d" fill-opacity="0.35"/>

  <!-- newspaper page -->
  <rect x="190" y="90" width="230" height="280" fill="#161616" stroke="#5a5a5a" stroke-width="3"/>
  <rect x="212" y="114" width="130" height="20" fill="#e5e5e5"/>
  <line x1="212" y1="150" x2="398" y2="150" stroke="#5a5a5a" stroke-width="2"/>
  <line x1="212" y1="168" x2="398" y2="168" stroke="#5a5a5a" stroke-width="2"/>
  <line x1="212" y1="186" x2="360" y2="186" stroke="#5a5a5a" stroke-width="2"/>
  <line x1="212" y1="216" x2="398" y2="216" stroke="#3a3a3a" stroke-width="2"/>
  <line x1="212" y1="234" x2="398" y2="234" stroke="#3a3a3a" stroke-width="2"/>
  <line x1="212" y1="252" x2="330" y2="252" stroke="#3a3a3a" stroke-width="2"/>
  <rect x="212" y="278" width="90" height="66" fill="#0d0d0d" stroke="#3a3a3a" stroke-width="2"/>
  <line x1="316" y1="278" x2="398" y2="278" stroke="#3a3a3a" stroke-width="2"/>
  <line x1="316" y1="296" x2="398" y2="296" stroke="#3a3a3a" stroke-width="2"/>
  <line x1="316" y1="314" x2="380" y2="314" stroke="#3a3a3a" stroke-width="2"/>

  <!-- sentiment trend line, blue accent -->
  <polyline points="212,330 240,340 268,320 296,344 324,330" fill="none" stroke="#39ff7a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- magnifier scanning headlines -->
  <circle cx="430" cy="180" r="52" fill="#0d0d0d" fill-opacity="0.55" stroke="#e5e5e5" stroke-width="4"/>
  <line x1="467" y1="217" x2="512" y2="262" stroke="#e5e5e5" stroke-width="6" stroke-linecap="round"/>

  <!-- sentiment arrow up, accent -->
  <g transform="translate(430,180)">
    <path d="M-14 12 L0 -12 L14 12" fill="none" stroke="#39ff7a" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="0" y1="-12" x2="0" y2="18" stroke="#39ff7a" stroke-width="5" stroke-linecap="round"/>
  </g>
</svg>
