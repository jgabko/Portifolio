<svg viewBox="0 0 700 438" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t4">
  <title id="t4">poker-eq — monte carlo poker equity engine</title>
  <defs>
    <pattern id="stripes4" width="11" height="11" patternTransform="rotate(135)" patternUnits="userSpaceOnUse">
      <rect width="11" height="11" fill="#0d0d0d"/>
      <line x1="0" y1="0" x2="0" y2="11" stroke="#1f1f1f" stroke-width="2"/>
    </pattern>
  </defs>

  <rect width="700" height="438" fill="url(#stripes4)"/>
  <rect width="700" height="438" fill="#0d0d0d" fill-opacity="0.35"/>

  <!-- fanned cards -->
  <g transform="translate(280,300)">
    <g transform="rotate(-18)">
      <rect x="-45" y="-90" width="90" height="128" rx="8" fill="#161616" stroke="#5a5a5a" stroke-width="3"/>
      <path d="M-45 -70 l-15 -8 l15 -8 l0 16 z" fill="none"/>
    </g>
    <g transform="rotate(0)">
      <rect x="-45" y="-96" width="90" height="128" rx="8" fill="#101010" stroke="#e5e5e5" stroke-width="3"/>
      <path d="M0 -66 l14 26 h-28 z" fill="#e5e5e5"/>
      <rect x="-3" y="-40" width="6" height="16" fill="#e5e5e5"/>
    </g>
    <g transform="rotate(18)">
      <rect x="-45" y="-90" width="90" height="128" rx="8" fill="#161616" stroke="#39ff7a" stroke-width="3"/>
      <path d="M0 -60 c16 -18 40 0 0 30 c-40 -30 -16 -48 0 -30 Z" fill="#39ff7a"/>
    </g>
  </g>

  <!-- equity readout -->
  <g transform="translate(470,140)">
    <circle r="70" fill="none" stroke="#232323" stroke-width="14"/>
    <circle r="70" fill="none" stroke="#39ff7a" stroke-width="14" stroke-linecap="round"
      stroke-dasharray="345 440" transform="rotate(-90)"/>
    <text x="0" y="10" text-anchor="middle" font-family="'Space Mono', monospace" font-size="34" fill="#e5e5e5">68%</text>
  </g>

  <!-- monte carlo scatter dots -->
  <g fill="#5a5a5a">
    <circle cx="150" cy="120" r="3"/>
    <circle cx="170" cy="150" r="3"/>
    <circle cx="130" cy="160" r="3"/>
    <circle cx="190" cy="110" r="3"/>
    <circle cx="160" cy="90" r="3"/>
    <circle cx="200" cy="140" r="3"/>
    <circle cx="120" cy="130" r="3"/>
  </g>
</svg>
